<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 -5 640 560" width="640" height="560" role="img" aria-label="Aida Motavas logo - impossible A">
  <defs>
    <clipPath id="cp-left-leg"><polygon points="0 0, 37.5 -64.95, 440 -64.95, 477.5 0, 440 64.95, 37.5 64.95" /></clipPath>
    <clipPath id="cp-apex"><polygon points="0 0, 37.5 -64.95, 112.5 -64.95, 150 0, 112.5 64.95, 37.5 64.95" /></clipPath>
    <clipPath id="cp-right-leg"><polygon points="0 0, 37.5 -64.95, 296 -64.95, 258.5 0, 221 64.95, 37.5 64.95" /></clipPath>
    <clipPath id="cp-bottom-bar"><polygon points="0 0, 37.5 -64.95, 367.5 -64.95, 330 0, 292.5 64.95, 37.5 64.95" /></clipPath>
  </defs>
  <g fill="currentColor">
    <!-- Feet -->
    <g transform="translate(37.5, 415) rotate(120)">
      <polygon opacity="0.45" points="0 0, 37.5 64.95, 105 64.95, 105 0" />
      <polygon opacity="1"    points="0 0, 37.5 -64.95, 105 -64.95, 105 0" />
    </g>
    <g transform="translate(441.5, 415) rotate(60)">
      <polygon opacity="0.7"  points="0 0, 37.5 -64.95, 105 -64.95, 105 0" />
      <polygon opacity="0.45" points="0 0, 37.5 64.95, 105 64.95, 105 0" />
    </g>
    <!-- Penrose triangle -->
    <g transform="translate(37.5, 415) rotate(-60)" clip-path="url(#cp-left-leg)">
      <polygon opacity="0.45" points="0 0, 0 -64.95, 480 -64.95, 480 0" />
      <polygon opacity="1"    points="0 0, 0 64.95, 480 64.95, 480 0" />
    </g>
    <g transform="translate(202, 0) rotate(60)" clip-path="url(#cp-apex)">
      <polygon opacity="0.7"  points="0 0, 0 -64.95, 112.5 -64.95, 112.5 0" />
      <polygon opacity="0.45" points="0 0, 0 64.95, 112.5 64.95, 112.5 0" />
      <polygon opacity="1"    points="112.5 64.95, 75 0, 112.5 -64.95, 150 0" />
    </g>
    <g transform="translate(202, 0) rotate(60) translate(72, 0)" clip-path="url(#cp-right-leg)">
      <polygon opacity="0.7"  points="0 0, 0 -64.95, 294 -64.95, 294 0" />
      <polygon opacity="0.45" points="0 0, 0 64.95, 294 64.95, 294 0" />
    </g>
    <g transform="translate(277, 0) rotate(60) translate(404) rotate(120)" clip-path="url(#cp-bottom-bar)">
      <polygon opacity="1"    points="0 0, 0 -64.95, 366.5 -64.95, 366.5 0" />
      <polygon opacity="0.7"  points="0 0, 0 64.95, 366.5 64.95, 366.5 0" />
    </g>
  </g>
</svg>
